<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Compass</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="switch.css">
    <link rel="stylesheet" href="table1.css">
    <link rel="stylesheet" href="table2.css">
    <style>
@import url('https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap');
</style>
</head>
<body>
    <div id="parent">
        <div class="navBar google-sans" >
            <div style="display: flex;justify-content: center; align-items: center;">
                <img src="./assets/Curr-comp-logo.png" style="width:75px; height: 75px;" alt="">
                <h1>Currency Compass</h1>
            </div>
            <label class="switch">
  <input type="checkbox" id="themeToggle">
  <span class="slider" ></span>
</label>
        </div>
        <div class="mainBody">
            <div class="table1">
                <div class="headingTable1">
                    <h1>Convert Currency</h1>
                </div>
                <div class="bodyTable1">

                    <div class="box1">
                       <div class="currency-selector">
                            <input type="text" id="inputCurrency" placeholder="Input Currency">
                            <div id="inputDropdown" class="dropdown"></div>
                            </div>
                            <input type="number" id="inputCurrencyAmount" placeholder="Amount">
                        </div>
                    <div class="box2">
                        <button class="calculate" style="border: 0px;"><img src="./assets/image-removebg-preview.png" alt=""></button>
                    </div>
                    <div class="box3">
                        
                        <div class="currency-selector">
    <input type="text" id="outputCurrency" placeholder="Output Currency">
    <div id="outputDropdown" class="dropdown"></div>
</div>
                        
                        <input type="number" id="outputCurrencyAmount" placeholder="Amount">
                    </div>
                </div>
                </div>
            <div class="table2">
                <div class="headingTable2">
                    <h1>To be Added Soon.......</h1>
                </div>
                <div class="inputTable2">

                </div>

            </div>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
